<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBELIK — Interactive Workflow Architecture</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f8f7f4;min-height:100vh;padding:24px 16px}
#fc-wrap{max-width:860px;margin:0 auto;background:#fff;border-radius:16px;border:1px solid #e8e5de;padding:24px}
#fc-header{text-align:center;margin-bottom:16px}
#fc-header h1{font-size:18px;font-weight:700;color:#1a1a2e;letter-spacing:.03em}
#fc-header p{font-size:12px;color:#888;margin-top:4px}
#legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:18px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
#canvas-wrap{width:100%}
#fc{width:100%;display:block}
.fc-node{cursor:pointer}
.fc-node rect{transition:opacity .18s}
.fc-node:hover rect{opacity:.82}
@keyframes dash-flow{to{stroke-dashoffset:-20}}
.flow-line{stroke-dasharray:6 4;animation:dash-flow 1.2s linear infinite}
#detail-panel{margin-top:18px;border-radius:12px;border:1px solid #e0ddd6;background:#fff;overflow:hidden;display:none}
#dp-header{padding:14px 18px 12px;border-bottom:1px solid #f0ede8}
#dp-title{font-size:15px;font-weight:700;color:#1a1a2e}
#dp-phase{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;margin-top:3px}
#dp-body{padding:14px 18px}
#dp-desc{font-size:13px;color:#444;line-height:1.7;margin-bottom:12px}
#dp-extra{margin-bottom:10px}
#dp-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.dp-link{font-size:11px;padding:4px 12px;border-radius:12px;border:1px solid;cursor:default}
#dp-close{float:right;font-size:22px;cursor:pointer;color:#bbb;line-height:1;margin-top:-2px;transition:color .15s}
#dp-close:hover{color:#333}
.ift-wrap{border-radius:8px;border:1px solid #CECBF6;background:#EEEDFE;padding:12px 14px;margin-bottom:2px}
.ift-label{font-size:11px;font-weight:700;color:#3C3489;margin-bottom:8px;letter-spacing:.05em}
.ift-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid #CECBF6;font-size:12px;color:#26215C}
.ift-row:last-child{border-bottom:none}
.score-wrap{border-radius:8px;border:1px solid #FAC775;background:#FAEEDA;padding:12px 14px;margin-bottom:2px}
.score-label-top{font-size:11px;font-weight:700;color:#412402;margin-bottom:10px;letter-spacing:.05em}
.score-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid #f5d88a;font-size:12px}
.score-row:last-child{border-bottom:none}
.sc-name{color:#412402;font-weight:500;flex:0 0 200px}
.sc-bar-wrap{flex:1;margin:0 12px;height:7px;background:#f5e6c0;border-radius:4px;overflow:hidden}
.sc-bar{height:7px;border-radius:4px;background:#BA7517}
.sc-max{color:#854F0B;font-weight:700;font-size:12px;min-width:50px;text-align:right}
.sc-qual{color:#999;font-style:italic;font-size:11px;min-width:50px;text-align:right}
footer{text-align:center;margin-top:20px;font-size:11px;color:#aaa}
</style>
</head>
<body>

<div id="fc-wrap">
  <div id="fc-header">
    <h1>OBELIK — Interactive Workflow Architecture</h1>
    <p>360° Construction Governance Platform &nbsp;·&nbsp; Click any node to explore</p>
  </div>

  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>Initiation</div>
    <div class="leg"><div class="leg-dot" style="background:#888780"></div>Procurement</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Contractor</div>
    <div class="leg"><div class="leg-dot" style="background:#185FA5"></div>Site ops</div>
    <div class="leg"><div class="leg-dot" style="background:#D85A30"></div>Supply chain</div>
    <div class="leg"><div class="leg-dot" style="background:#BA7517"></div>Payments</div>
    <div class="leg"><div class="leg-dot" style="background:transparent;border:1.5px dashed #3B6D11"></div>Feedback loop</div>
  </div>

  <div id="canvas-wrap">
  <svg id="fc" viewBox="0 0 760 980" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Actor pills -->
    <rect x="60" y="18" width="160" height="28" rx="14" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
    <text x="140" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">Client / Project Owner</text>
    <rect x="300" y="18" width="160" height="28" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
    <text x="380" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Contractor</text>
    <rect x="540" y="18" width="160" height="28" rx="14" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
    <text x="620" y="37" text-anchor="middle" font-size="11" font-weight="600" fill="#412402">Vendor / Supplier</text>

    <!-- NODE 1 -->
    <g class="fc-node" id="n-project" onclick="showDetail('project')">
      <rect x="230" y="68" width="300" height="52" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
      <text x="380" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="#3C3489">1. Project creation</text>
      <text x="380" y="107" text-anchor="middle" font-size="10" fill="#534AB7">IFT · BOQ · drawings · specifications · budget</text>
    </g>
    <line x1="380" y1="120" x2="380" y2="148" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 2 -->
    <g class="fc-node" id="n-bidding" onclick="showDetail('bidding')">
      <rect x="230" y="148" width="300" height="52" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.5"/>
      <text x="380" y="169" text-anchor="middle" font-size="13" font-weight="700" fill="#2C2C2A">2. Bidding</text>
      <text x="380" y="187" text-anchor="middle" font-size="10" fill="#5F5E5A">Open tender · digital audit trail · time stamped</text>
    </g>
    <line x1="380" y1="200" x2="380" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 3 -->
    <g class="fc-node" id="n-eval" onclick="showDetail('eval')">
      <rect x="230" y="228" width="300" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text x="380" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">3. Contractor evaluation engine</text>
      <text x="380" y="267" text-anchor="middle" font-size="10" fill="#0F6E56">Scored criteria · max 100 points</text>
    </g>
    <line x1="380" y1="280" x2="380" y2="300" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 4a -->
    <g class="fc-node" id="n-short" onclick="showDetail('short')">
      <rect x="100" y="300" width="230" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text x="215" y="321" text-anchor="middle" font-size="12" font-weight="700" fill="#085041">4a. Shortlisting and invite</text>
      <text x="215" y="339" text-anchor="middle" font-size="10" fill="#0F6E56">Top ranked · formal invitation sent</text>
    </g>

    <!-- NODE 4b -->
    <g class="fc-node" id="n-reject" onclick="showDetail('reject')">
      <rect x="430" y="300" width="230" height="52" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5" stroke-dasharray="5 3"/>
      <text x="545" y="321" text-anchor="middle" font-size="12" font-weight="700" fill="#791F1F">4b. Not qualified</text>
      <text x="545" y="339" text-anchor="middle" font-size="10" fill="#A32D2D">Notified · audit log retained</text>
    </g>

    <path d="M330 294 L215 294 L215 300" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>
    <path d="M430 294 L545 294 L545 300" fill="none" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="215" y1="352" x2="215" y2="378" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>
    <path d="M215 378 L380 378 L380 388" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 5 -->
    <g class="fc-node" id="n-award" onclick="showDetail('award')">
      <rect x="230" y="388" width="300" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
      <text x="380" y="409" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">5. Contractor award</text>
      <text x="380" y="427" text-anchor="middle" font-size="10" fill="#0F6E56">Formal selection · contract issuance</text>
    </g>
    <line x1="380" y1="440" x2="380" y2="468" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 6 -->
    <g class="fc-node" id="n-onboard" onclick="showDetail('onboard')">
      <rect x="230" y="468" width="300" height="52" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="2"/>
      <text x="380" y="489" text-anchor="middle" font-size="13" font-weight="700" fill="#085041">6. Automatic contractor onboarding</text>
      <text x="380" y="507" text-anchor="middle" font-size="10" fill="#0F6E56">Compliance · docs · access — instant and structured</text>
    </g>
    <line x1="380" y1="520" x2="380" y2="548" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- SITE OPS CONTAINER -->
    <rect x="60" y="548" width="640" height="230" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="6 3"/>
    <text x="100" y="570" font-size="10" font-weight="700" fill="#0C447C" letter-spacing=".07em">SITE OPERATIONS LAYER</text>

    <!-- NODE 7 -->
    <g class="fc-node" id="n-site" onclick="showDetail('site')">
      <rect x="230" y="578" width="300" height="52" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
      <text x="380" y="599" text-anchor="middle" font-size="13" font-weight="700" fill="#0C447C">7. Site monitoring</text>
      <text x="380" y="617" text-anchor="middle" font-size="10" fill="#185FA5">Real time · timestamped · verified updates</text>
    </g>

    <path d="M290 630 L180 630 L180 658" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>
    <path d="M470 630 L580 630 L580 658" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 7a -->
    <g class="fc-node" id="n-vendor" onclick="showDetail('vendor')">
      <rect x="80" y="658" width="200" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
      <text x="180" y="678" text-anchor="middle" font-size="11" font-weight="700" fill="#712B13">7a. Vendor and material</text>
      <text x="180" y="696" text-anchor="middle" font-size="10" fill="#993C1D">Sourcing · requests · supply access</text>
    </g>

    <!-- NODE 7b -->
    <g class="fc-node" id="n-supply" onclick="showDetail('supply')">
      <rect x="480" y="658" width="200" height="52" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
      <text x="580" y="678" text-anchor="middle" font-size="11" font-weight="700" fill="#712B13">7b. Supply chain traceability</text>
      <text x="580" y="696" text-anchor="middle" font-size="10" fill="#993C1D">Delivery confirm · material tracking</text>
    </g>

    <!-- Feedback loop -->
    <path d="M80 604 L40 604 L40 494 L80 494" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr-green)"/>
    <rect x="2" y="538" width="18" height="52" rx="4" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
    <text x="11" y="573" text-anchor="middle" font-size="8" fill="#27500A" transform="rotate(-90,11,562)">review loop</text>
    <rect x="82" y="489" width="136" height="26" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
    <text x="150" y="506" text-anchor="middle" font-size="10" font-weight="600" fill="#27500A">Manager review</text>
    <path d="M150 515 L150 562 L230 562" fill="none" stroke="#3B6D11" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-green)"/>

    <line x1="380" y1="778" x2="380" y2="808" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr)" class="flow-line"/>

    <!-- NODE 8 -->
    <g class="fc-node" id="n-milestone" onclick="showDetail('milestone')">
      <rect x="230" y="808" width="300" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="2"/>
      <text x="380" y="829" text-anchor="middle" font-size="13" font-weight="700" fill="#412402">8. Milestone verification</text>
      <text x="380" y="847" text-anchor="middle" font-size="10" fill="#854F0B">Independent progress check · payment trigger</text>
    </g>

    <path d="M290 860 L180 860 L180 900" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)" class="flow-line"/>
    <path d="M470 860 L580 860 L580 900" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr-amber)" class="flow-line"/>

    <!-- NODE 9a -->
    <g class="fc-node" id="n-pay-cc" onclick="showDetail('pay-cc')">
      <rect x="80" y="900" width="200" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
      <text x="180" y="920" text-anchor="middle" font-size="11" font-weight="700" fill="#412402">Client to Contractor</text>
      <text x="180" y="938" text-anchor="middle" font-size="10" fill="#854F0B">Milestone gated · escrow release</text>
    </g>

    <!-- NODE 9b -->
    <g class="fc-node" id="n-pay-cv" onclick="showDetail('pay-cv')">
      <rect x="480" y="900" width="200" height="52" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
      <text x="580" y="920" text-anchor="middle" font-size="11" font-weight="700" fill="#412402">Contractor to Vendor</text>
      <text x="580" y="938" text-anchor="middle" font-size="10" fill="#854F0B">Delivery verified · supply payment</text>
    </g>

    <rect x="60" y="960" width="640" height="10" rx="5" fill="#1a1a2e" opacity=".85"/>
  </svg>
  </div>

  <div id="detail-panel">
    <div id="dp-header">
      <span id="dp-close" onclick="closeDetail()">×</span>
      <div id="dp-title"></div>
      <div id="dp-phase"></div>
    </div>
    <div id="dp-body">
      <div id="dp-desc"></div>
      <div id="dp-extra"></div>
      <div id="dp-links"></div>
    </div>
  </div>

</div>

<footer>OBELIK Technologies Ltd &nbsp;·&nbsp; Transforming Construction Across Africa &nbsp;·&nbsp; obelik.com</footer>

<script>
const nodes={
  project:{title:'Project creation',phase:'Phase 1 · Initiation',phaseColor:'#534AB7',desc:'The client or project owner initiates an Invitation for Tender (IFT) through OBELIK. All necessary tender documentation is uploaded directly to the platform, creating a structured, auditable project record that all downstream procurement activity is anchored to.',extra:'ift',links:['Bidding']},
  bidding:{title:'Bidding',phase:'Phase 2 · Procurement',phaseColor:'#5F5E5A',desc:'OBELIK opens a transparent, structured tender process. All contractor submissions are digitally recorded, time stamped, and stored in an immutable audit framework. This eliminates informal bid manipulation and ensures every submission is traceable and defensible.',links:['Project creation','Evaluation engine']},
  eval:{title:'Contractor evaluation engine',phase:'Phase 3 · Contractor management',phaseColor:'#0F6E56',desc:'A structured scoring engine assesses each bidder across five criteria. Evaluators apply weighted scores to produce a transparent, objective ranking. All scores and observations are recorded in an auditable evaluation log.',extra:'scores',links:['Bidding','Shortlisting','Not qualified']},
  short:{title:'Shortlisting and invite',phase:'Phase 4a · Contractor management',phaseColor:'#0F6E56',desc:'Top ranked contractors are formally shortlisted based on evaluation scores. OBELIK automatically generates and sends structured invitation letters to shortlisted firms, including project brief, terms of engagement, and next step instructions.',links:['Evaluation engine','Contractor award']},
  reject:{title:'Not qualified',phase:'Phase 4b · Contractor management',phaseColor:'#A32D2D',desc:'Contractors who do not meet threshold scores are formally notified via OBELIK. The full evaluation result is logged in an audit ready record. This ensures transparency and provides a structured reference if the decision is challenged.',links:['Evaluation engine']},
  award:{title:'Contractor award',phase:'Phase 5 · Contractor management',phaseColor:'#0F6E56',desc:'The winning contractor is formally selected and a digital contract is issued directly through OBELIK. Contract terms, deliverables, milestone schedule, and payment conditions are locked into the platform, creating the binding reference for all future activity.',links:['Shortlisting','Automatic onboarding']},
  onboard:{title:'Automatic contractor onboarding',phase:'Phase 6 · Contractor management',phaseColor:'#0F6E56',desc:'Once awarded, the contractor is automatically onboarded. Compliance documents are submitted, verified, and stored. Site access is provisioned and the contractor team is set up in the project environment. This replaces weeks of manual back and forth with a structured, automated flow.',links:['Contractor award','Site monitoring']},
  site:{title:'Site monitoring',phase:'Phase 7 · Site operations',phaseColor:'#185FA5',desc:'OBELIK provides continuous, real time visibility into site activity. Contractors submit daily updates including progress reports, photo evidence, and issue logs, all timestamped and verified. Project managers receive and review these daily, creating a live record of site performance accessible to all authorised stakeholders.',links:['Onboarding','Vendor and material','Supply chain','Milestone verification']},
  vendor:{title:'Vendor and material sourcing',phase:'Phase 7a · Supply chain',phaseColor:'#993C1D',desc:'From within the site monitoring layer, contractors raise material requests and source from a verified vendor ecosystem. Suppliers gain structured visibility into active project demand, replacing informal procurement networks with a transparent, auditable pipeline.',links:['Site monitoring','Supply chain traceability']},
  supply:{title:'Supply chain traceability',phase:'Phase 7b · Supply chain',phaseColor:'#993C1D',desc:'Every material order, delivery confirmation, and usage record is tracked end to end. OBELIK maintains a full chain of custody, ensuring that what was ordered, delivered, and used is verifiable at every stage. This directly reduces material misappropriation and reconciliation disputes.',links:['Site monitoring','Vendor sourcing']},
  milestone:{title:'Milestone verification',phase:'Phase 8 · Financial settlement',phaseColor:'#854F0B',desc:'Before any payment is released, an independent milestone verification is triggered. OBELIK checks that the defined project milestone has been completed and documented. Only verified milestones unlock payment disbursement, creating a performance linked financial system.',links:['Site monitoring','Client to Contractor','Contractor to Vendor']},
  'pay-cc':{title:'Client to Contractor payment',phase:'Phase 9a · Payment',phaseColor:'#854F0B',desc:'Following milestone verification, funds are released to the contractor. Disbursements are structured, transparent, and tied directly to verified work completion, eliminating arbitrary payment delays and disputes over payment basis.',links:['Milestone verification']},
  'pay-cv':{title:'Contractor to Vendor payment',phase:'Phase 9b · Payment',phaseColor:'#854F0B',desc:'Contractors release payments to vendors gated on confirmed delivery and material verification. This creates a unified payment trail from client to contractor to vendor, with every transaction auditable and linked to a specific milestone and material record.',links:['Milestone verification']}
};

const iftDocs=['Bill of quantities','Architectural and engineering drawings','Financial specifications','Technical specifications','Project location details','Approved budget'];
const scores=[{label:'Price reasonableness',max:40},{label:'Programme and methodology',max:25},{label:'Technical competence',max:20},{label:'Experience and credentials',max:15},{label:'Evaluator observations',max:null}];

function showDetail(id){
  const n=nodes[id];if(!n)return;
  document.getElementById('dp-title').textContent=n.title;
  const ph=document.getElementById('dp-phase');
  ph.textContent=n.phase;ph.style.color=n.phaseColor;
  document.getElementById('dp-desc').textContent=n.desc;
  const ex=document.getElementById('dp-extra');ex.innerHTML='';

  if(n.extra==='ift'){
    const w=document.createElement('div');w.className='ift-wrap';
    const lbl=document.createElement('div');lbl.className='ift-label';lbl.textContent='IFT DOCUMENTATION UPLOADED BY MANAGER';w.appendChild(lbl);
    iftDocs.forEach(d=>{
      const row=document.createElement('div');row.className='ift-row';
      row.innerHTML=`<svg width="13" height="13" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="2" fill="#7F77DD" opacity=".25" stroke="#7F77DD" stroke-width="0.8"/><path d="M3 6l2 2 4-4" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-linecap="round"/></svg>${d}`;
      w.appendChild(row);
    });
    ex.appendChild(w);
  }

  if(n.extra==='scores'){
    const w=document.createElement('div');w.className='score-wrap';
    const lbl=document.createElement('div');lbl.className='score-label-top';lbl.textContent='EVALUATION CRITERIA · TOTAL 100 POINTS';w.appendChild(lbl);
    scores.forEach(s=>{
      const row=document.createElement('div');row.className='score-row';
      if(s.max){
        const pct=Math.round((s.max/100)*100);
        row.innerHTML=`<span class="sc-name">${s.label}</span><div class="sc-bar-wrap"><div class="sc-bar" style="width:${pct}%"></div></div><span class="sc-max">Max ${s.max}</span>`;
      } else {
        row.innerHTML=`<span class="sc-name">${s.label}</span><div class="sc-bar-wrap"></div><span class="sc-qual">Qualitative</span>`;
      }
      w.appendChild(row);
    });
    ex.appendChild(w);
  }

  const lw=document.getElementById('dp-links');
  lw.innerHTML=n.links.map(l=>`<span class="dp-link" style="border-color:${n.phaseColor};color:${n.phaseColor}">${l}</span>`).join('');
  document.getElementById('detail-panel').style.display='block';
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  document.querySelectorAll('.fc-node rect').forEach(r=>r.style.opacity='0.35');
  const el=document.getElementById('n-'+id);
  if(el)el.querySelector('rect').style.opacity='1';
}

function closeDetail(){
  document.getElementById('detail-panel').style.display='none';
  document.querySelectorAll('.fc-node rect').forEach(r=>r.style.opacity='1');
}
